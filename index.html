<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Super AI Content Creator - Pro Version</title>
    <style>
        :root {
            --tiktok-black: #010101;
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --gray-dark: #121212;
            --gray-light: #1e1e1e;
            --card-bg: #2c2c2c;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tiktok-black);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--gray-dark);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--tiktok-pink), var(--tiktok-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .api-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ff4757;
        }

        .grid-config {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--gray-light);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ddd;
        }

        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--tiktok-cyan);
            outline: none;
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--tiktok-pink), #ff5e7e);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .result-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }

        .scene-card {
            background: var(--card-bg);
            border-left: 5px solid var(--tiktok-pink);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .scene-header {
            font-weight: bold;
            color: var(--tiktok-cyan);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prompt-box {
            background: #151515;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #00ffcc;
            margin-top: 8px;
            border: 1px solid #333;
        }

        .btn-action {
            background: #25d366;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-copy {
            background: #444;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TikTok Super AI Content Creator</h1>
    <div class="subtitle">Direct Gemini API Integration - Siap Jual di Lynk.id</div>

    <!-- API KEY INPUT (Pembeli bisa masukkan key mereka sendiri) -->
    <div class="api-box">
        <label for="apiKey">🔑 Masukkan Gemini API Key Anda:</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="AQ.Ab8RN6KBEcbTTUZ7NRjmH-jmsXxuCp5RDx-ZPkCm9crTbnY11g">
        <small style="color: #bbb;">*Dapatkan API key gratis di Google AI Studio jika belum punya.</small>
    </div>

    <!-- PENGATURAN KONTEN -->
    <div class="grid-config">
        <div>
            <label for="scriptStyle">🎨 Style Bahasa:</label>
            <select id="scriptStyle">
                <option value="Casual & Santai layaknya obrolan kopi">☕ Casual & Santai</option>
                <option value="Gen Z kekinian dengan bahasa gaul/slang">🔥 Gen Z / Gaul</option>
                <option value="Edukatif, Informatif dan Profesional">🧠 Edukatif & Informatif</option>
                <option value="Review jujur, terkesan objektif namun persuasif">⭐ Review Jujur</option>
            </select>
        </div>
        <div>
            <label for="imageStyle">🖼️ Style Visual Gambar:</label>
            <select id="imageStyle">
                <option value="3D Pixar animation style, cute character, vibrant colors">🧸 3D Pixar Style</option>
                <option value="Cinematic realistic photography, shot on 85mm lens, hyper-detailed">📸 Cinematic Realistic</option>
                <option value="Aesthetic anime style, Makoto Shinkai vibe, masterwork">🌸 Aesthetic Anime</option>
            </select>
        </div>
    </div>

    <label for="topicInput">💡 Masukkan Ide Konten / Nama Produk:</label>
    <textarea id="topicInput" rows="3" placeholder="Contoh: Dompet kulit pria minimalis anti air atau 3 tips mengelola gaji bulanan..."></textarea>

    <button class="btn-generate" id="btnGen" onclick="generateWithGemini()">Generate Konten Viral dengan Gemini AI 🚀</button>

    <!-- OUTPUT -->
    <div class="result-box" id="resultContainer" style="display: none;">
        <h2>Hasil Naskah & Voice Over 7 Scene</h2>
        <div id="scenesOutput"></div>
    </div>
</div>

<script>
    async function generateWithGemini() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const topic = document.getElementById('topicInput').value.trim();
        const style = document.getElementById('scriptStyle').value;
        const imgStyle = document.getElementById('imageStyle').value;
        const btn = document.getElementById('btnGen');

        if (!apiKey) { alert("Silakan masukkan Gemini API Key Anda terlebih dahulu!"); return; }
        if (!topic) { alert("Masukkan ide atau produk Anda!"); return; }

        btn.innerText = "⏳ Gemini sedang berpikir keras...";
        btn.disabled = true;

        // Prompt khusus yang memaksa Gemini membalas dengan format JSON murni agar mudah diproses aplikasi
        const prompt = `Anda adalah TikTok Creator Specialist. Buat skrip video TikTok berdurasi 7 scene mengenai topik/produk: "${topic}". 
Gaya bahasa Voice Over harus: ${style}.
Gaya Gambar AI untuk setiap scene harus disesuaikan dengan: ${imgStyle}.

Format respons WAJIB berupa JSON array dengan struktur tepat seperti ini (tanpa markdown, tanpa teks pembuka/penutup, cukup raw JSON saja):
[
  {
    "scene": 1,
    "vo": "teks voice over bahasa indonesia yang natural, fasih, persuasif",
    "visual": "deskripsi gambar detail dalam bahasa inggris untuk prompt AI Image generator"
  }
]`;

        try {
            const response = await fetch(`https://generativetoolkit.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const data = await response.json();
            const rawJsonText = data.candidates[0].content.parts[0].text;
            const scenes = JSON.parse(rawJsonText);

            displayResults(scenes);
        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan. Pastikan API Key Anda benar dan kuota gratis Anda masih aktif.");
        } finally {
            btn.innerText = "Generate Konten Viral dengan Gemini AI 🚀";
            btn.disabled = false;
        }
    }

    function displayResults(scenes) {
        const container = document.getElementById('scenesOutput');
        container.innerHTML = "";

        scenes.forEach(s => {
            const card = document.createElement('div');
            card.className = 'scene-card';
            card.id = `scene-${s.scene}`;
            card.innerHTML = `
                <div class="scene-header">
                    <span>🎬 SCENE ${s.scene}</span>
                    <div>
                        <button class="btn-action" onclick="playTTS('${s.scene}')">🗣️ Putar Suara</button>
                        <button class="btn-copy" onclick="copyScene('${s.scene}')">📋 Copy</button>
                    </div>
                </div>
                <p><strong>Voice Over (Indonesia):</strong> <span class="vo-text">${s.vo}</span></p>
                <div class="prompt-box">
                    <strong>🤖 Prompt Gambar AI:</strong><br>
                    <span class="prompt-text">${s.visual}</span>
                </div>
                <div class="audio-container"></div>
            `;
            container.appendChild(card);
        });

        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
    }

    function playTTS(sceneId) {
        const card = document.getElementById(`scene-${sceneId}`);
        const text = card.querySelector('.vo-text').innerText;
        const audioContainer = card.querySelector('.audio-container');
        
        // Memakai Google Translate TTS API yang fasih berbahasa Indonesia asli
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=id&client=tw-ob&q=${encodeURIComponent(text)}`;
        
        audioContainer.innerHTML = `
            <audio controls autoplay>
                <source src="${url}" type="audio/mpeg">
            </audio>
        `;
    }

    function copyScene(sceneId) {
        const card = document.getElementById(`scene-${sceneId}`);
        const vo = card.querySelector('.vo-text').innerText;
        const prompt = card.querySelector('.prompt-text').innerText;
        navigator.clipboard.writeText(`VO: ${vo}\n\nPrompt AI: ${prompt}`);
        alert(`Scene ${sceneId} berhasil dicalin!`);
    }
</script>
</body>
</html>
