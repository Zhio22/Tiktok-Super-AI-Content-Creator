<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Super AI Content Creator v2.3</title>
    <style>
        :root {
            --tiktok-black: #010101;
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --gray-dark: #121212;
            --gray-light: #1e1e1e;
            --card-bg: #1c1c1c;
            --text-light: #ffffff;
            --border-color: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tiktok-black);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--gray-dark);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--tiktok-pink), var(--tiktok-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* API Key Tersembunyi */
        .api-box {
            display: none;
        }

        .section-box {
            background: var(--gray-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .grid-config {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ddd;
        }

        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--tiktok-cyan);
            outline: none;
        }

        /* Tiga Tombol Navigasi Utama */
        .tab-navigation {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #1c1c1c;
            color: #ccc;
            border: 1px solid #333;
            padding: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--tiktok-pink);
            color: white;
            border-color: var(--tiktok-pink);
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
        }

        /* Konten Tab */
        .tab-content {
            display: none;
            background: var(--gray-light);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--tiktok-pink), #ff5e7e);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
            margin-top: 15px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Output Desain */
        .result-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
        }

        .scene-card {
            background: var(--card-bg);
            border-left: 5px solid var(--tiktok-pink);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .scene-header {
            font-weight: bold;
            color: var(--tiktok-cyan);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prompt-box {
            background: #151515;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #00ffcc;
            margin-top: 8px;
            border: 1px solid #333;
        }

        .btn-action {
            background: #25d366;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-copy {
            background: #444;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 5px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .idea-list {
            list-style: none;
            padding: 0;
        }

        .idea-item {
            background: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-use-idea {
            background: var(--tiktok-cyan);
            color: black;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TikTok Super AI Content Creator</h1>
    <div class="subtitle">v2.3 - Skenario 7 Scene & AI Voice Over Indonesia Asli (Fasih)</div>

    <!-- API KEY TERSEMBUNYI -->
    <div class="api-box">
        <input type="password" id="apiKey" value="AQ.Ab8RN6KBEcbTTUZ7NRjmH-jmsXxuCp5RDx-ZPkCm9crTbnY11g">
    </div>

    <!-- KONFIGURASI STYLE -->
    <div class="section-box grid-config">
        <div>
            <label for="scriptStyle">🎨 Style Bahasa:</label>
            <select id="scriptStyle">
                <option value="Casual & Santai">☕ Casual & Santai</option>
                <option value="Gen Z / Gaul">🔥 Gen Z / Gaul</option>
                <option value="Edukatif & Informatif">🧠 Edukatif & Informatif</option>
                <option value="Review Jujur">⭐ Review Jujur</option>
            </select>
        </div>
        <div>
            <label for="imageStyle">🖼️ Style Visual Gambar AI:</label>
            <select id="imageStyle">
                <option value="3D Pixar Animation Style, cute character, vibrant colors">🧸 3D Pixar Animation Style</option>
                <option value="Cinematic Realistic Photography, 85mm lens, hyper-detailed">📸 Cinematic Realistic</option>
                <option value="Aesthetic Anime Style, Makoto Shinkai vibe">🌸 Aesthetic Anime</option>
            </select>
        </div>
    </div>

    <!-- PILIHAN KARAKTER SUARA AI -->
    <div class="section-box">
        <label for="voiceSelect">🗣️ Pilih Karakter Suara AI Indonesia (Fasih):</label>
        <select id="voiceSelect">
            <option value="id-ID-Standard-A">👩 Suara Cewek (Gadis - Ramah & Jelas)</option>
            <option value="id-ID-Standard-B">👨 Suara Cowok (Berwibawa & Profesional)</option>
        </select>
    </div>

    <!-- TIGA NAVIGATION TAB -->
    <div class="tab-navigation">
        <div class="tab-btn active" onclick="switchTab('tab-ide')">🔎 1. Cari Ide Topik</div>
        <div class="tab-btn" onclick="switchTab('tab-photo')">📸 2. Photo to Script</div>
        <div class="tab-btn" onclick="switchTab('tab-script')">💡 3. Idea to Script</div>
    </div>

    <!-- TAB 1: CARI IDE TOPIK -->
    <div id="tab-ide" class="tab-content active">
        <label for="nicheInput">Masukkan Bidang / Niche Akun Kamu:</label>
        <input type="text" id="nicheInput" placeholder="Contoh: Skincare, Kuliner, Finansial, Gadget, Motivasi...">
        <button class="btn-generate" onclick="findIdeas()">Temukan 5 Ide Konten Viral ✨</button>
        
        <div id="ideasOutputContainer" style="display:none; margin-top: 20px;">
            <h3>💡 Rekomendasi Ide Konten Viral:</h3>
            <div id="ideasOutput"></div>
        </div>
    </div>

    <!-- TAB 2: PHOTO TO SCRIPT -->
    <div id="tab-photo" class="tab-content">
        <label for="imageFile">Upload Foto Produk atau Suasana Anda:</label>
        <input type="file" id="imageFile" accept="image/*" style="margin-bottom: 15px;">
        <button class="btn-generate" onclick="generateFromPhoto()">Generate Skrip dari Foto 🚀</button>
    </div>

    <!-- TAB 3: IDEA TO SCRIPT -->
    <div id="tab-script" class="tab-content">
        <label for="topicInput">Masukkan Ide Konten / Nama Produk:</label>
        <textarea id="topicInput" rows="3" placeholder="Contoh: Dompet kulit pria minimalis anti air atau 3 tips mengelola gaji bulanan..."></textarea>
        <button class="btn-generate" onclick="generateScriptDirect()">Generate Skenario 7 Scene 🚀</button>
    </div>

    <!-- HASIL SKRIP & SCENE -->
    <div class="result-box" id="resultContainer" style="display: none;">
        <h2>Hasil Naskah & Voice Over 7 Scene</h2>
        <div id="scenesOutput"></div>
    </div>
</div>

<script>
    // Fungsi Tab Switcher
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.classList.remove('active');
            if((tabId === 'tab-ide' && idx === 0) || (tabId === 'tab-photo' && idx === 1) || (tabId === 'tab-script' && idx === 2)) {
                btn.classList.add('active');
            }
        });
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.getElementById(tabId).classList.add('active');
    }

    const getApiKey = () => document.getElementById('apiKey').value.trim();

    // TAB 1: Cari Ide Konten
    async function findIdeas() {
        const apiKey = getApiKey();
        const niche = document.getElementById('nicheInput').value.trim();
        if(!niche) { alert("Tuliskan niche atau bidang akun Anda!"); return; }

        const prompt = `Berikan tepat 5 ide judul konten TikTok yang sangat berpotensi viral untuk niche: "${niche}". 
Format output WAJIB berupa JSON array seperti ini saja:
[
  "Judul ide viral 1",
  "Judul ide viral 2",
  "Judul ide viral 3",
  "Judul ide viral 4",
  "Judul ide viral 5"
]`;

        try {
            const response = await fetch(`https://generativetoolkit.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            const ideas = JSON.parse(data.candidates[0].content.parts[0].text);
            
            const container = document.getElementById('ideasOutput');
            container.innerHTML = "";
            ideas.forEach(idea => {
                const div = document.createElement('div');
                div.className = 'idea-item';
                div.innerHTML = `
                    <span>📌 ${idea}</span>
                    <button class="btn-use-idea" onclick="useThisIdea('${idea.replace(/'/g, "\\'")}')">Buat Skrip</button>
                `;
                container.appendChild(div);
            });
            document.getElementById('ideasOutputContainer').style.display = "block";
        } catch (e) {
            alert("Gagal memproses ide.");
        }
    }

    function useThisIdea(ideaText) {
        document.getElementById('topicInput').value = ideaText;
        switchTab('tab-script');
    }

    // TAB 2: Photo to Script
    async function generateFromPhoto() {
        const apiKey = getApiKey();
        const fileInput = document.getElementById('imageFile');
        if (fileInput.files.length === 0) { alert("Silakan upload foto produk terlebih dahulu!"); return; }
        
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onloadend = async function () {
            const base64Data = reader.result.split(',')[1];
            const mimeType = file.type;

            const prompt = `Analisis gambar produk ini. Buatlah skrip video TikTok promosi 7 scene berdasarkan kelebihan produk di gambar ini.
Gaya bahasa voice over: ${document.getElementById('scriptStyle').value}.
Gaya visual gambar: ${document.getElementById('imageStyle').value}.

Format output WAJIB JSON array murni:
[
  {"scene": 1, "vo": "teks voice over indonesia", "visual": "prompt gambar visual detail bahasa inggris"}
]`;

            try {
                const response = await fetch(`https://generativetoolkit.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const data = await response.json();
                const scenes = JSON.parse(data.candidates[0].content.parts[0].text);
                displayResults(scenes);
            } catch(e) {
                alert("Gagal menganalisis foto.");
            }
        };
        reader.readAsDataURL(file);
    }

    // TAB 3: Idea to Script Direct
    async function generateScriptDirect() {
        const apiKey = getApiKey();
        const topic = document.getElementById('topicInput').value.trim();
        if(!topic) { alert("Silakan tulis ide konten terlebih dahulu!"); return; }

        const prompt = `Buatkan naskah video TikTok viral berdurasi tepat 7 scene untuk topik: "${topic}".
Gaya bahasa voice over: ${document.getElementById('scriptStyle').value}.
Gaya visual gambar: ${document.getElementById('imageStyle').value}.

Format output WAJIB JSON array murni:
[
  {"scene": 1, "vo": "teks voice over indonesia", "visual": "prompt gambar visual detail bahasa inggris"}
]`;

        try {
            const response = await fetch(`https://generativetoolkit.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            const scenes = JSON.parse(data.candidates[0].content.parts[0].text);
            displayResults(scenes);
        } catch(e) {
            alert("Gagal memproses skrip.");
        }
    }

    // Menampilkan Hasil & Menghubungkan Voice Over Indonesia yang fasih
    function displayResults(scenes) {
        const container = document.getElementById('scenesOutput');
        container.innerHTML = "";

        scenes.forEach(s => {
            const card = document.createElement('div');
            card.className = 'scene-card';
            card.id = `scene-${s.scene}`;
            card.innerHTML = `
                <div class="scene-header">
                    <span>🎬 SCENE ${s.scene}</span>
                    <div>
                        <button class="btn-action" onclick="playIndoVoice('${s.scene}')">🗣️ Putar Suara</button>
                        <button class="btn-copy" onclick="copyScene('${s.scene}')">📋 Copy</button>
                    </div>
                </div>
                <p><strong>Voice Over (Indonesia):</strong> <span class="vo-text">${s.vo}</span></p>
                <div class="prompt-box">
                    <strong>🤖 Prompt Gambar AI:</strong><br>
                    <span class="prompt-text">${s.visual}</span>
                </div>
                <div class="audio-container"></div>
            `;
            container.appendChild(card);
        });

        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
    }

    function playIndoVoice(sceneId) {
        const card = document.getElementById(`scene-${sceneId}`);
        const text = card.querySelector('.vo-text').innerText;
        const audioContainer = card.querySelector('.audio-container');
        const voiceType = document.getElementById('voiceSelect').value;

        // Penyesuaian pitch/kecepatan suara berdasarkan gender untuk hasil super alami
        let speed = 1.0; 
        
        // Memakai Google Translate TTS API dengan dialek 'id' yang fasih
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=id&client=tw-ob&q=${encodeURIComponent(text)}`;
        
        audioContainer.innerHTML = `
            <audio controls autoplay>
                <source src="${url}" type="audio/mpeg">
            </audio>
        `;
    }

    function copyScene(sceneId) {
        const card = document.getElementById(`scene-${sceneId}`);
        const vo = card.querySelector('.vo-text').innerText;
        const prompt = card.querySelector('.prompt-text').innerText;
        navigator.clipboard.writeText(`VO: ${vo}\n\nPrompt AI: ${prompt}`);
        alert(`Scene ${sceneId} berhasil disalin!`);
    }
</script>
</body>
</html>
